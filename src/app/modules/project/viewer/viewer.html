<section class="relative w-full h-svh bg-black">
  <div class="absolute inset-0 w-full h-full" #pano></div>
  <div class="absolute inset-0 w-full h-full flex items-center justify-center" #video></div>
  @if (configs.hasValue()) {
    @if (scene.hasValue()) {
      @if (configs.value().logo.mini) {
        <app-header
          [logo]="configs.value().logo.mini || configs.value().logo.src"
          [title]="scene.value().name"
          class="fixed md:hidden top-0 inset-x-0 z-10"
        ></app-header>
        <app-header
          [logo]="configs.value().logo.src"
          [title]="scene.value().name"
          class="fixed hidden md:block top-0 inset-x-0 z-10"
        ></app-header>
      } @else {
        <app-header
          [logo]="configs.value().logo.src"
          [title]="scene.value().name"
          class="fixed top-0 inset-x-0 z-10"
        ></app-header>
      }
    }
    <app-footer
      [scenes]="configs.value().scenes"
      class="fixed bottom-0 inset-x-0 z-10 pointer-events-none"
    ></app-footer>
  }
</section>
<router-outlet></router-outlet>
