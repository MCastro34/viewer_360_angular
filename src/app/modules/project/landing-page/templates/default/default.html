<section
  class="w-full h-svh grid grid-cols-4 sm:grid-cols-8 md:grid-cols-12 auto-rows-[auto_1fr_auto] px-4 gap-x-4 py-6 md:px-14 md:py-8 overflow-auto"
>
  <div
    class="-z-50 inset-0 w-full h-full flex items-center justify-center fixed after:content-[''] after:absolute after:inset-0 after:w-full after:h-full after:bg-neutral-70/80"
  >
    @if (configs().background.type === 'image') {
      <img class="w-full h-full object-cover" [src]="configs().background.src" alt="" />
    }
  </div>
  <div class="col-span-4 sm:col-span-8 md:col-span-12 md:mb-16 flex items-start justify-between">
    @if (configs().logo.src) {
      <img class="h-14 w-auto md:h-20" [src]="configs().logo.src" alt="Logo" />
    }
  </div>
  <div
    class="col-span-4 sm:col-span-8 md:col-span-12 auto-rows-min md:self-center grid grid-cols-4 sm:grid-cols-8 md:grid-cols-12 gap-x-4 md:mb-4"
  >
    <h3 class="block md:hidden col-span-4 md:col-span-6 col-start-1 mt-16 text-white">
      {{ project().title }}
    </h3>
    <h2 class="hidden md:block col-span-4 md:col-span-6 col-start-1 text-white">
      {{ project().title }}
    </h2>
    <p
      class="block md:hidden body1 col-span-4 sm:col-span-8 md:col-span-6 col-start-1 row-start-2 mt-4 text-neutral-20"
    >
      {{ project().description }}
    </p>
    <h6
      class="hidden md:block col-span-4 sm:col-span-8 md:col-span-6 col-start-1 row-start-2 mt-4 text-neutral-20"
    >
      {{ project().description }}
    </h6>
    <div class="col-span-4 md:col-span-6 col-start-1 row-start-3 grid grid-cols-2 gap-4 mt-8">
      <a
        class="col-span-2 md:col-span-1 rounded-full bg-main py-3 flex items-center justify-center gap-2 self-end"
        [routerLink]="['./viewer', configs().entry]"
      >
        <span class="button text-white">{{ startVisitLabel }}</span>
        <i class="av-arrow-forward text-2xl text-white"></i>
      </a>
      @if (configs().guided.enabled) {
        <a
          class="col-span-2 md:col-span-1 rounded-full bg-white py-3 flex items-center justify-center gap-2"
          [routerLink]="['./viewer', configs().entry]"
        >
          <span class="button text-main">{{ guidedVisitLabel }}</span>
          <i class="av-arrow-forward text-2xl text-main"></i>
        </a>
        <p class="col-span-2 body2 text-neutral-20">{{ watchHereLabel }}</p>
      }
    </div>
  </div>
  <div
    class="col-span-4 sm:col-span-8 md:col-span-12 flex items-end justify-between md:justify-end mt-8"
  >
    <a href="https://3decide.com" target="_blank">
      <img class="h-12 w-auto" src="svg/poweredby_av.svg" alt="Powered by AliveVision" />
    </a>
  </div>
</section>
